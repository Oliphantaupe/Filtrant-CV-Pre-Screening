worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Upload rate-limiting: 50 req/min per IP, burst of 10
    limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=50r/m;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy all /api/* calls to FastAPI backend
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 10m;
        }

        # Rate-limit the upload endpoint specifically
        location = /api/v1/upload {
            limit_req zone=upload_zone burst=10 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 10m;
        }

        # SPA fallback — all unmatched routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
