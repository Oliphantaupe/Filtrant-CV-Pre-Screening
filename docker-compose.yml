services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://filtrant:filtrant@postgres:5432/filtrant
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ENV: development
    volumes:
      - ./data:/app/data
      - ./backend/ml:/app/ml
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: filtrant
      POSTGRES_PASSWORD: filtrant
      POSTGRES_DB: filtrant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filtrant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
