services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://filtrant:filtrant@postgres:5432/filtrant
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENV: development
    volumes:
      - ./data:/app/data
      - ./backend/ml:/app/ml
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: filtrant
      POSTGRES_PASSWORD: filtrant
      POSTGRES_DB: filtrant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filtrant"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      WEBHOOK_URL: http://localhost:5678/
      FILESYSTEM_ALLOW_LOCAL_FILE_ACCESS: "true"
      N8N_RESTRICT_FILE_ACCESS_TO: "/data:/home/node/.n8n-files"
      NODES_EXCLUDE: "[]"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data
      - ./n8n/workflows:/workflows
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
